#:schema node_modules/wrangler/config-schema.json
name = "career-craft"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
NEXTJS_ENV = "production"

[[assets]]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true